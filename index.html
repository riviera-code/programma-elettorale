    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --brand-blue: #0047AB;
            --brand-dark: #0f172a;
            --brand-light: #f8fafc;
            --brand-accent: #3b82f6;
            --dashboard-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dashboard-bg);
            color: #1e293b;
        }

        h1, h2, h3, h4, h5, .font-lexend {
            font-family: 'Lexend', sans-serif;
        }

        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dashboard-card:hover {
            border-color: var(--brand-accent);
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--brand-dark);
        }

        .prose ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .prose li {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }

        .prose li::before {
            content: "•";
            position: absolute;
            left: 0.5rem;
            color: var(--brand-accent);
            font-weight: 900;
            font-size: 1.2rem;
        }

        .btn-primary {
            background-color: var(--brand-blue);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--brand-dark);
            transform: scale(1.02);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .quote-box {
            background-color: #f8fafc;
            border-left: 4px solid var(--brand-blue);
            padding: 1.5rem;
            margin-top: 2rem;
            font-style: italic;
            border-radius: 0.5rem 2rem 2rem 0.5rem;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="max-w-md w-full mx-4 p-10 bg-white rounded-[2.5rem] shadow-2xl text-center">
            <img src="https://bordigheradomani.it/img/logo.png" alt="Bordighera Domani" class="h-28 mx-auto mb-8">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-2 uppercase tracking-tight">Accesso Candidati</h1>
            <p class="text-slate-500 mb-8 font-medium">Inserisci la password per consultare il programma integrale.</p>
            
            <input type="password" id="password-input" placeholder="Password" 
                class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition-all mb-4 text-center text-xl tracking-widest font-bold">

                class="w-full btn-primary text-white font-black py-4 rounded-2xl transition shadow-xl shadow-blue-200 uppercase tracking-widest text-sm">

    <!-- App Wrapper -->
    <div id="app" class="hidden">
        
        <!-- Navbar -->
        <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200">

                        <div class="hidden md:block text-left">

                <p class="text-slate-500 text-sm font-medium italic">"Una città che torna a funzionare. E torna a crescere."</p>
            </div>

    </div>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm hidden">
        <div class="bg-white rounded-[3rem] w-full max-w-lg p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <i class="fab fa-whatsapp text-2xl text-green-500"></i>
                    <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Invia Feedback</h3>
                </div>
                <button onclick="document.getElementById('feedback-modal').classList.add('hidden')" class="text-slate-300 hover:text-slate-600 transition">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <div class="space-y-6">
                <p class="text-sm text-slate-500 font-medium">Scrivi il tuo suggerimento. Premendo invia si aprirà WhatsApp per completare l'invio al coordinatore.</p>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Tuo Nome e Cognome</label>
                    <input type="text" id="fb-name" placeholder="Esempio: Mario Rossi" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-blue-100 font-semibold">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Nota o Suggerimento</label>
                    <textarea id="fb-text" rows="5" placeholder="Cosa ne pensi di questa sezione?" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-blue-100 font-semibold"></textarea>

                    Invia su WhatsApp <i class="fab fa-whatsapp"></i>
                </button>
            </div>
        </div>
    </div>

                                <div class="dashboard-card p-12 bg-blue-600 text-white shadow-2xl shadow-blue-100 relative overflow-hidden">
                                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-6">I Primi 100 Giorni</h2>
                                    <p class="text-blue-50 mb-10 leading-relaxed font-medium text-lg">

                                    </p>
                                    <button onclick="showPage('100giorni')" class="bg-white text-blue-600 px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-slate-900 hover:text-white transition">

                            <div class="mb-24">

                                    <h3 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Aree Tematiche</h3>

                                                ${ch.num}

                                            </div>

                                <div class="relative z-10">
                                    <h2 class="text-4xl sm:text-6xl font-black mb-10 uppercase tracking-tighter">La Visione Finale</h2>
                                    <p class="text-xl sm:text-2xl text-slate-400 max-w-3xl mx-auto mb-16 font-medium leading-relaxed italic">
                                        "Bordighera deve tornare ad essere una città che funziona per chi ci vive e che cresce grazie a chi la sceglie."
                                    </p>
                                    <button onclick="showPage('visione')" class="bg-blue-600 text-white px-12 py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-white hover:text-slate-900 transition">
                                        Documento di Chiusura

            premessa: {
                title: "PREMESSA",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700 leading-relaxed">
                        <p>Bordighera è una città con storia, identità e potenziale che meritano molto di più di quanto espresso negli ultimi anni.</p>
                        <p>Oggi molti cittadini percepiscono un progressivo declino: meno cura degli spazi pubblici, servizi meno efficienti, meno opportunità per i giovani, meno vitalità economica e culturale.</p>
                        <p>Un declino che si riflette anche sull'attrattività turistica — e quindi sull'intera economia della città. Ma non è inevitabile. È il risultato di una gestione senza una direzione chiara.</p>
                        <p>Bordighera Domani nasce per costruire un'alternativa concreta: non promesse più lunghe, ma un metodo diverso.</p>
                        
                        <p class="mt-6 font-bold text-slate-900">La differenza non la fanno le idee. La fanno i risultati. E i risultati dipendono dal metodo: obiettivi chiari, azioni coerenti, tempi dichiarati, rendicontazione pubblica. Non è il budget che fa la differenza. È come lo si utilizza.</p>
                        
                        <h4 class="text-blue-700 font-black uppercase text-xs tracking-widest mt-10 mb-4">Il nostro approccio si fonda su tre principi semplici:</h4>
                        <ul class="font-bold text-slate-800">
                            <li>Manutenzione, decoro e verde come base irrinunciabile della qualità urbana</li>
                            <li>Servizi e opportunità reali per chi vive la città ogni giorno</li>
                            <li>Una visione di sviluppo turistico, culturale e identitario di lungo periodo</li>
                        </ul>
                    </div>
                `
            },
            "100giorni": {
                title: "I PRIMI 100 GIORNI",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700 leading-relaxed">

                        <ul class="space-y-6">
                            <li>Piano straordinario di pulizia e decoro urbano, con priorità alle zone più degradate</li>
                            <li>Interventi urgenti su strade, marciapiedi e illuminazione — centro e frazioni</li>
                            <li>Attivazione completa e verifica del sistema di videosorveglianza</li>
                            <li>Tavolo permanente con commercianti, imprese e categorie economiche</li>
                            <li>Definizione e pubblicazione del calendario annuale degli eventi culturali e turistici</li>
                            <li>Avvio immediato della comunicazione turistica sui mercati di prossimità — in particolare il mercato francese — con materiali in lingua e presenza sui canali digitali</li>
                        </ul>
                    </div>
                `
            },
            sec1: {
                title: "1. DECORO URBANO E MANUTENZIONE",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700">
                        <p>La prima richiesta dei cittadini è semplice: una città curata. Oggi questo manca, ed è evidente nella vita quotidiana.</p>
                        <p>Strade sporche, marciapiedi trascurati, aiuole lasciate a sé stesse e punti di raccolta rifiuti problematici non sono dettagli secondari: incidono ogni giorno sulla qualità della vita e sull'immagine della città. È da qui che vogliamo ripartire.</p>
                        <p>Il decoro urbano non è un intervento occasionale, ma un lavoro continuo. La differenza tra una città che funziona e una che non funziona sta nella costanza della manutenzione, nell'attenzione ai dettagli e nella capacità di intervenire in modo rapido ed efficace.</p>
                        <h3>Piano straordinario per il decoro urbano</h3>
                        <ul>
                            <li>Pulizia straordinaria di strade, marciapiedi e sottopassi</li>
                            <li>Sostituzione dei gettacarte e degli arredi urbani ammalorati</li>
                            <li>Manutenzione delle aiuole e del verde pubblico</li>
                            <li>Interventi contro il degrado e le deiezioni canine</li>
                            <li>Attenzione concreta alle frazioni (Sasso e Borghetto)</li>
                        </ul>
                        <h3>Riforma del sistema di raccolta rifiuti</h3>
                        <ul>
                            <li>Semplificazione del sistema di conferimento</li>
                            <li>Miglioramento pulizia isole ecologiche</li>
                            <li>Riqualificazione estetica punti raccolta</li>
                            <li>Soluzioni specifiche per imprese e hotel</li>
                        </ul>
                        <div class="quote-box">
                            La manutenzione non è una voce di spesa: è un investimento sulla reputazione della città. Una città pulita, ordinata e ben illuminata trasmette cura, rispetto e qualità.
                        </div>
                    </div>
                `
            },
            sec2: {
                title: "2. VERDE URBANO",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700">
                        <p>Il verde urbano non è solo estetica. È una scelta progettuale che incide sui costi e sull'identità. Il verde mal pianificato è costoso. Il verde progettato riduce i costi di gestione.</p>
                        <h3>Piano botanico strategico</h3>

                            <li>Riduzione strutturale dei costi di gestione</li>

                            <li>Piantumazione di nuovo verde urbano (palme e specie autoctone)</li>
                        </ul>
                        <div class="quote-box">

                        </div>

                        </div>

                        </div>
                    </div>
                `

            sec6: {

                    <div class="prose prose-slate max-w-none font-medium text-slate-700">
                        <p>Una città funziona quando nessuno resta indietro. Serve un approccio più coordinato e umano.</p>
                        <ul>

                            <li>Rafforzamento assistenza domiciliare di prossimità</li>

        let currentPage = 'home';

        function checkPassword() {
            const val = document.getElementById('password-input').value;
            if (val.toLowerCase() === 'gregorio') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                showPage('home');
            } else {
                document.getElementById('error-message').classList.remove('hidden');
                document.getElementById('password-input').value = "";
            }
        }

        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function showPage(pageId) {
            currentPage = pageId;
            const container = document.getElementById('page-content');
            const data = programData[pageId];

            if (pageId === 'home') {
                container.innerHTML = data.render();
            } else {
                const idx = chapters.findIndex(c => c.id === pageId);
                const prev = idx > 0 ? chapters[idx-1] : (['visione', '100giorni', 'premessa'].includes(pageId) ? {id: 'home', title: 'Home'} : null);
                const next = idx !== -1 && idx < chapters.length - 1 ? chapters[idx+1] : (pageId === 'premessa' ? {id: '100giorni', title: '100 Giorni'} : null);

                container.innerHTML = `
                    <div class="page-transition">
                        <div class="bg-white border-b border-slate-200 py-20 px-4 mb-12">
                            <div class="max-w-4xl mx-auto text-center">
                                <button onclick="showPage('home')" class="text-blue-600 font-black text-[10px] uppercase tracking-[0.4em] mb-6 hover:opacity-70 transition block mx-auto">
                                    <i class="fas fa-arrow-left"></i> Home
                                </button>
                                <h1 class="text-4xl sm:text-6xl font-black text-slate-900 uppercase tracking-tighter leading-none">${data.title}</h1>
                            </div>
                        </div>

                        <div class="max-w-4xl mx-auto px-4">
                            <div class="bg-white rounded-[3rem] p-10 sm:p-20 shadow-sm border border-slate-200 overflow-hidden relative">
                                ${data.content}
                            </div>

                            <div class="flex justify-between items-center mt-12 mb-24 px-6">
                                ${prev ? `
                                    <button onclick="showPage('${prev.id}')" class="flex flex-col items-start group">
                                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em] mb-1">Precedente</span>
                                        <span class="text-xs font-black text-slate-900 group-hover:text-blue-600 transition uppercase tracking-tight">${prev.title}</span>
                                    </button>
                                ` : '<div></div>'}
                                
                                ${next ? `
                                    <button onclick="showPage('${next.id}')" class="flex flex-col items-end group text-right">
                                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em] mb-1">Successivo</span>
                                        <span class="text-xs font-black text-slate-900 group-hover:text-blue-600 transition uppercase tracking-tight">${next.title}</span>
                                    </button>
                                ` : '<div></div>'}

                        </div>
                    </div>
                `;
            }
            window.scrollTo(0, 0);
        }

        function sendFeedback() {
            const name = document.getElementById('fb-name').value;
            const text = document.getElementById('fb-text').value;
            
            if(!text) {
                alert("Inserisci un commento prima di inviare.");
                return;
            }

            const phone = "393891131311";
            const section = programData[currentPage] ? programData[currentPage].title : "Generale";
            const encodedMsg = encodeURIComponent(
                `*Feedback Programma Bordighera Domani*\n\n` +
                `*Candidato:* ${name || 'Anonimo'}\n` +
                `*Sezione:* ${section}\n\n` +
                `*Feedback:* ${text}`
            );

            // Reindirizzamento WhatsApp
            window.open(`https://wa.me/${phone}?text=${encodedMsg}`, '_blank');
            
            document.getElementById('feedback-modal').classList.add('hidden');
            document.getElementById('fb-text').value = "";
