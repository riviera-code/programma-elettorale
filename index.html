
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordighera Domani - Programma Integrale 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --brand-blue: #0047AB;
            --brand-dark: #0f172a;
            --brand-light: #f8fafc;
            --brand-accent: #3b82f6;
            --dashboard-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dashboard-bg);
            color: #1e293b;
        }

        h1, h2, h3, h4, h5, .font-lexend {
            font-family: 'Lexend', sans-serif;
        }

        .page-transition {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dashboard-card:hover {
            border-color: var(--brand-accent);
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--brand-dark);
        }

        .prose ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .prose li {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 0.75rem;
            line-height: 1.6;
        }

        .prose li::before {
            content: "•";
            position: absolute;
            left: 0.5rem;
            color: var(--brand-accent);
            font-weight: 900;
            font-size: 1.2rem;
        }

        .btn-primary {
            background-color: var(--brand-blue);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--brand-dark);
            transform: scale(1.02);
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .quote-box {
            background-color: #f8fafc;
            border-left: 4px solid var(--brand-blue);
            padding: 1.5rem;
            margin-top: 2rem;
            font-style: italic;
            border-radius: 0.5rem 2rem 2rem 0.5rem;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="max-w-md w-full mx-4 p-10 bg-white rounded-[2.5rem] shadow-2xl text-center">
            <img src="https://bordigheradomani.it/img/logo.png" alt="Bordighera Domani" class="h-28 mx-auto mb-8">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-2 uppercase tracking-tight">Accesso Candidati</h1>
            <p class="text-slate-500 mb-8 font-medium">Inserisci la password per consultare il programma integrale.</p>
            
            <input type="password" id="password-input" placeholder="Password" 
                class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 outline-none transition-all mb-4 text-center text-xl tracking-widest font-bold">
            
            <button onclick="checkPassword()" 
                class="w-full btn-primary text-white font-black py-4 rounded-2xl transition shadow-xl shadow-blue-200 uppercase tracking-widest text-sm">
                Sblocca Documento
            </button>
            <p id="error-message" class="text-red-500 text-sm mt-4 font-bold hidden">Accesso negato.</p>
        </div>
    </div>

    <!-- App Wrapper -->
    <div id="app" class="hidden">
        
        <!-- Navbar -->
        <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-20">
                    <button onclick="showPage('home')" class="flex items-center gap-4 transition hover:opacity-80">
                        <img src="https://bordigheradomani.it/img/logo.png" alt="Logo" class="h-10 sm:h-12">
                        <div class="hidden sm:block text-left">
                            <span class="block text-xs font-black text-blue-900 leading-none tracking-[0.15em] uppercase">Bordighera</span>
                            <span class="block text-xs font-black text-blue-600 leading-none tracking-[0.15em] uppercase">Domani</span>
                        </div>
                    </button>
                    
                    <div class="flex items-center gap-4 sm:gap-8">
                        <button onclick="showPage('home')" class="text-slate-600 hover:text-blue-600 font-black text-[10px] uppercase tracking-widest transition">Home</button>
                        <button onclick="document.getElementById('feedback-modal').classList.remove('hidden')" 
                            class="bg-blue-600 text-white px-5 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-100">
                            Feedback
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div id="page-content" class="min-h-screen">
            <!-- Injected via JS -->
        </div>

        <!-- Footer -->
        <footer class="bg-white border-t border-slate-200 py-16 mt-12">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <img src="https://bordigheradomani.it/img/logo.png" alt="Bordighera Domani" class="h-12 mx-auto mb-6 opacity-40">
                <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mb-4">Programma Elettorale 2025</p>
                <p class="text-slate-500 text-sm font-medium italic">"Una città che torna a funzionare. E torna a crescere."</p>
            </div>
        </footer>
    </div>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm hidden">
        <div class="bg-white rounded-[3rem] w-full max-w-lg p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-slate-900 uppercase tracking-tight">Feedback Candidato</h3>
                <button onclick="document.getElementById('feedback-modal').classList.add('hidden')" class="text-slate-300 hover:text-slate-600 transition">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Nome e Cognome</label>
                    <input type="text" id="fb-name" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-blue-100 font-semibold">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Commento Integrale</label>
                    <textarea id="fb-text" rows="5" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-blue-100 font-semibold"></textarea>
                </div>
                <button onclick="sendFeedback()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-700 transition uppercase tracking-[0.2em] text-xs">Invia al Team</button>
            </div>
        </div>
    </div>

    <script>
        const programData = {
            home: {
                render: () => `
                    <div class="page-transition">
                        <!-- Dashboard Header -->
                        <div class="bg-white border-b border-slate-200 py-24 px-4">
                            <div class="max-w-5xl mx-auto text-center">
                                <span class="bg-blue-50 text-blue-600 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.3em] mb-8 inline-block shadow-sm">Versione v17 - Integrale</span>
                                <h1 class="text-5xl sm:text-8xl font-black text-slate-900 mb-10 leading-[0.95] tracking-tighter">
                                    Bordighera<br><span class="text-blue-600 uppercase">Domani</span>
                                </h1>
                                <p class="text-xl sm:text-2xl text-slate-500 max-w-3xl mx-auto font-medium leading-relaxed italic">
                                    "Una città che torna a funzionare. E torna a crescere."
                                </p>
                            </div>
                        </div>

                        <div class="max-w-7xl mx-auto px-4 py-20">
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-20">
                                <div class="dashboard-card p-12 bg-white relative overflow-hidden group">
                                    <h2 class="text-3xl font-black text-slate-900 uppercase tracking-tighter mb-6">Premessa</h2>
                                    <p class="text-slate-600 mb-10 leading-relaxed font-medium text-lg">
                                        Il punto di partenza, il metodo di lavoro e i principi che guidano la nostra proposta alternativa per Bordighera.
                                    </p>
                                    <button onclick="showPage('premessa')" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-blue-600 transition">
                                        Leggi Premessa Integrale
                                    </button>
                                </div>

                                <div class="dashboard-card p-12 bg-blue-600 text-white shadow-2xl shadow-blue-100 relative overflow-hidden">
                                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-6">I Primi 100 Giorni</h2>
                                    <p class="text-blue-50 mb-10 leading-relaxed font-medium text-lg">
                                        Azioni concrete e immediate fin dall'insediamento per ridare dignità alla città e alla sua gestione.
                                    </p>
                                    <button onclick="showPage('100giorni')" class="bg-white text-blue-600 px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-slate-900 hover:text-white transition">
                                        Agenda Operativa Completa
                                    </button>
                                </div>
                            </div>

                            <div class="mb-24">
                                <div class="flex items-center justify-between mb-12 px-6">
                                    <h3 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Aree Tematiche</h3>
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">17 Capitoli Integrali</span>
                                </div>
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                    ${chapters.map(ch => `
                                        <button onclick="showPage('${ch.id}')" class="dashboard-card p-10 text-left group flex flex-col h-full hover:shadow-xl">
                                            <div class="w-14 h-14 bg-slate-50 text-blue-600 rounded-2xl flex items-center justify-center font-black text-xl mb-8 group-hover:bg-blue-600 group-hover:text-white transition-all">
                                                ${ch.num}
                                            </div>
                                            <h4 class="font-black text-slate-900 leading-tight mb-6 uppercase tracking-tight text-sm">${ch.title}</h4>
                                            <div class="mt-auto flex items-center gap-3 text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] opacity-0 group-hover:opacity-100 transition-opacity">
                                                Leggi Tutto <i class="fas fa-arrow-right"></i>
                                            </div>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <div class="bg-slate-900 rounded-[4rem] p-16 sm:p-24 text-center text-white shadow-3xl relative overflow-hidden">
                                <div class="relative z-10">
                                    <h2 class="text-4xl sm:text-6xl font-black mb-10 uppercase tracking-tighter">La Visione Finale</h2>
                                    <p class="text-xl sm:text-2xl text-slate-400 max-w-3xl mx-auto mb-16 font-medium leading-relaxed italic">
                                        "Bordighera deve tornare ad essere una città che funziona per chi ci vive e che cresce grazie a chi la sceglie."
                                    </p>
                                    <button onclick="showPage('visione')" class="bg-blue-600 text-white px-12 py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-white hover:text-slate-900 transition">
                                        Documento di Chiusura
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            premessa: {
                title: "PREMESSA",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700 leading-relaxed">
                        <p>Bordighera è una città con storia, identità e potenziale che meritano molto di più di quanto espresso negli ultimi anni.</p>
                        <p>Oggi molti cittadini percepiscono un progressivo declino: meno cura degli spazi pubblici, servizi meno efficienti, meno opportunità per i giovani, meno vitalità economica e culturale.</p>
                        <p>Un declino che si riflette anche sull'attrattività turistica — e quindi sull'intera economia della città. Ma non è inevitabile. È il risultato di una gestione senza una direzione chiara.</p>
                        <p>Bordighera Domani nasce per costruire un'alternativa concreta: non promesse più lunghe, ma un metodo diverso.</p>
                        
                        <p class="mt-6 font-bold text-slate-900">La differenza non la fanno le idee. La fanno i risultati. E i risultati dipendono dal metodo: obiettivi chiari, azioni coerenti, tempi dichiarati, rendicontazione pubblica. Non è il budget che fa la differenza. È come lo si utilizza.</p>
                        
                        <h4 class="text-blue-700 font-black uppercase text-xs tracking-widest mt-10 mb-4">Il nostro approccio si fonda su tre principi semplici:</h4>
                        <ul class="font-bold text-slate-800">
                            <li>Manutenzione, decoro e verde come base irrinunciabile della qualità urbana</li>
                            <li>Servizi e opportunità reali per chi vive la città ogni giorno</li>
                            <li>Una visione di sviluppo turistico, culturale e identitario di lungo periodo</li>
                        </ul>
                    </div>
                `
            },
            "100giorni": {
                title: "I PRIMI 100 GIORNI",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700 leading-relaxed">
                        <p class="mb-8 font-bold">Azioni concrete fin dall'insediamento:</p>
                        <ul class="space-y-6">
                            <li>Piano straordinario di pulizia e decoro urbano, con priorità alle zone più degradate</li>
                            <li>Interventi urgenti su strade, marciapiedi e illuminazione — centro e frazioni</li>
                            <li>Attivazione completa e verifica del sistema di videosorveglianza</li>
                            <li>Tavolo permanente con commercianti, imprese e categorie economiche</li>
                            <li>Definizione e pubblicazione del calendario annuale degli eventi culturali e turistici</li>
                            <li>Avvio immediato della comunicazione turistica sui mercati di prossimità — in particolare il mercato francese — con materiali in lingua e presenza sui canali digitali</li>
                        </ul>
                    </div>
                `
            },
            sec1: {
                title: "1. DECORO URBANO E MANUTENZIONE",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700">
                        <p>La prima richiesta dei cittadini è semplice: una città curata. Oggi questo manca, ed è evidente nella vita quotidiana.</p>
                        <p>Strade sporche, marciapiedi trascurati, aiuole lasciate a sé stesse e punti di raccolta rifiuti problematici non sono dettagli secondari: incidono ogni giorno sulla qualità della vita e sull'immagine della città. È da qui che vogliamo ripartire.</p>
                        <p>Il decoro urbano non è un intervento occasionale, ma un lavoro continuo. La differenza tra una città che funziona e una che non funziona sta nella costanza della manutenzione, nell'attenzione ai dettagli e nella capacità di intervenire in modo rapido ed efficace. La manutenzione non è una voce di spesa: è un investimento sulla reputazione della città, sulla qualità della vita dei cittadini e sull'attrattività turistica del territorio.</p>

                        <h3>Piano straordinario per il decoro urbano</h3>
                        <ul>
                            <li>Pulizia straordinaria di strade, marciapiedi e sottopassi</li>
                            <li>Sostituzione dei gettacarte e degli arredi urbani ormai arrugginiti e ammalorati</li>
                            <li>Manutenzione delle aiuole e del verde pubblico</li>
                            <li>Interventi contro il degrado e le deiezioni canine</li>
                            <li>Attenzione concreta alle frazioni (Sasso e Borghetto) e alle aree periferiche</li>
                        </ul>

                        <h3>Riforma del sistema di raccolta rifiuti</h3>
                        <p>Il sistema attuale di raccolta rifiuti presenta criticità evidenti: è spesso complicato da utilizzare, poco funzionale e non sempre garantisce il livello di pulizia che la città merita. Interverremo per renderlo più semplice, efficiente e decoroso:</p>
                        <ul>
                            <li>Semplificazione del sistema di conferimento, per renderlo accessibile a tutti, in particolare anziani, famiglie e turisti</li>
                            <li>Miglioramento della pulizia e della manutenzione delle isole ecologiche</li>
                            <li>Riqualificazione estetica dei punti di raccolta</li>
                            <li>Controlli più efficaci contro l'abbandono dei rifiuti</li>
                            <li>Soluzioni specifiche per semplificare la gestione dei rifiuti per imprese, ristoranti, alberghi e attività commerciali, attraverso un confronto diretto e costante con le categorie</li>
                        </ul>

                        <h3>Manutenzione di strade e marciapiedi</h3>
                        <ul>
                            <li>Piano pluriennale di rifacimento delle strade più deteriorate</li>
                            <li>Eliminazione delle barriere architettoniche</li>
                            <li>Marciapiedi sicuri per anziani, famiglie e persone con disabilità</li>
                        </ul>

                        <h3>Illuminazione pubblica</h3>
                        <ul>
                            <li>Potenziamento dell'illuminazione nelle zone critiche</li>
                            <li>Interventi prioritari su Via Romana e nei sottopassi</li>
                            <li><strong>Obiettivo:</strong> risultati visibili entro i primi 6 mesi di amministrazione</li>
                        </ul>

                        <div class="quote-box">
                            Decoro urbano, gestione dei rifiuti e illuminazione pubblica non sono aspetti secondari. Sono ciò che determina, ogni giorno, se una città funziona oppure no. Quando questi elementi funzionano, la città cambia: diventa più vivibile per i cittadini, più accogliente per chi arriva, più attrattiva per il turismo e per le attività economiche. Una città pulita, ordinata e ben illuminata non è solo più bella. È una città che trasmette cura, rispetto e qualità. Intervenire con continuità su questi ambiti significa costruire una base solida su cui può crescere tutto il resto: economia, turismo, vita sociale.
                        </div>
                    </div>
                `
            },
            sec2: {
                title: "2. VERDE URBANO: UN ASSET, NON UN COSTO",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700">
                        <p>Il verde urbano non è solo un elemento estetico. È una scelta progettuale che incide sui costi, sulla qualità della città e sulla sua identità.</p>
                        <p>Oggi, troppo spesso, il verde è gestito in modo frammentato, con interventi emergenziali e senza una visione complessiva. Questo genera costi elevati, risultati discontinui e una qualità urbana inferiore alle potenzialità del territorio. Vogliamo cambiare approccio.</p>
                        <p>Il verde mal pianificato è costoso e inefficace. Il verde progettato con criteri botanici adeguati al territorio riduce i costi di gestione, migliora l'estetica urbana e diventa un elemento identitario.</p>

                        <h3>Piano botanico strategico</h3>
                        <ul>
                            <li>Utilizzo prevalente di specie resistenti al clima mediterraneo, a bassa manutenzione e con fioriture stagionali</li>
                            <li>Riduzione strutturale dei costi di gestione nel tempo</li>
                            <li>Progettazione delle aiuole e degli spazi verdi, superando la logica degli interventi emergenziali</li>
                            <li>Piantumazione di nuovo verde urbano: palme e specie adattabili al clima mediterraneo, scelte per longevità e impatto visivo</li>
                            <li>Manutenzione e valorizzazione del patrimonio botanico storico: palme, specie rare, giardini storici</li>
                        </ul>

                        <h3>Il verde come attrazione turistica</h3>
                        <ul>
                            <li>Posizionamento di Bordighera come riferimento per il turismo botanico sulla Riviera</li>
                            <li>Realizzazione di percorsi botanici tematici, accessibili a residenti e visitatori</li>
                            <li>Valorizzazione dei giardini storici come destinazioni culturali</li>
                            <li>Promozione di eventi legati al patrimonio verde e alla stagionalità delle fioriture</li>
                            <li><strong>Obiettivo:</strong> trasformare la gestione del verde da voce di spesa a investimento strategico, identitario e turistico</li>
                        </ul>

                        <div class="quote-box">
                            Il verde, se progettato con metodo, lavora anche quando nessuno ci pensa: riduce i costi di manutenzione, migliora la qualità dell'aria, mitiga il calore estivo e aumenta il valore percepito degli spazi urbani. Non è un investimento a fondo perduto — è un investimento che genera ritorni nel tempo, in modo concreto e misurabile.
                        </div>
                    </div>
                `
            },
            sec3: {
                title: "3. SICUREZZA E QUALITÀ DELLA VITA",
                content: `
                    <div class="prose prose-slate max-w-none font-medium text-slate-700">
                        <p>Una città vivibile è una città sicura. Non è una percezione: è qualcosa che si vede ogni giorno. La sicurezza si misura nella possibilità di muoversi liberamente, vivere gli spazi pubblici, frequentare il centro e i quartieri senza difficoltà, in qualsiasi momento della giornata. Oggi questo equilibrio va rafforzato, con interventi concreti e continui.</p>
                        <p>La sicurezza non riguarda solo il controllo del territorio. Riguarda anche la qualità degli spazi urbani, l'illuminazione, il decoro e la presenza costante sul territorio.</p>

                        <h3>Presidio del territorio</h3>
                        <ul>
                            <li>Maggiore presenza della Polizia Locale nelle aree più frequentate e nei quartieri</li>
                            <li>Rafforzamento delle attività di controllo e prevenzione</li>
                            <li>Presenza visibile e continuativa, non solo in situazioni emergenziali</li>
                            <li>Attenzione specifica alle frazioni e alle aree periferiche, tradizionalmente meno presidiate</li>
                        </ul>

                        <h3>Videosorveglianza e controllo</h3>
                        <ul>
                            <li>Attivazione e manutenzione completa delle telecamere esistenti</li>
                            <li>Verifica costante del funzionamento del sistema</li>
                            <li>Utilizzo efficace degli strumenti di controllo per prevenire comportamenti scorretti</li>
                        </ul>

                        <h3>Contrasto al degrado urbano</h3>
                        <ul>
                            <li>Interventi mirati contro situazioni di degrado e incuria</li>
                            <li>Maggiore controllo sulla sosta selvaggia</li>
                            <li>Azioni coordinate tra sicurezza e decoro urbano</li>
                        </ul>

                        <h3>Sicurezza negli spazi pubblici</h3>
                        <ul>
                            <li>Attenzione particolare alle zone più frequentate nelle ore serali, come il lungomare</li>
                            <li>Miglioramento delle condizioni di sicurezza nei luoghi di aggregazione</li>
                            <li>Integrazione tra illuminazione, presenza e gestione degli spazi</li>

                        <div class="bg-white border-b border-slate-200 py-20 px-4 mb-12">

                                <button onclick="showPage('home')" class="text-blue-600 font-black text-[10px] uppercase tracking-[0.4em] mb-6 hover:opacity-70 transition block mx-auto">
                                    <i class="fas fa-arrow-left"></i> Home
                                </button>
                                <h1 class="text-4xl sm:text-6xl font-black text-slate-900 uppercase tracking-tighter leading-none">${data.title}</h1>
                            </div>
                        </div>

                        <!-- Content Body -->
                        <div class="max-w-4xl mx-auto px-4">
                            <div class="bg-white rounded-[3rem] p-10 sm:p-20 shadow-sm border border-slate-200 overflow-hidden relative">
                                ${data.content}
                            </div>

                            <!-- Dashboard Navigation Footer -->
                            <div class="flex justify-between items-center mt-12 mb-24 px-6">
                                ${prev ? `
                                    <button onclick="showPage('${prev.id}')" class="flex flex-col items-start group">
                                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em] mb-1">Precedente</span>
                                        <span class="text-xs font-black text-slate-900 group-hover:text-blue-600 transition uppercase tracking-tight">${prev.title}</span>
                                    </button>
                                ` : '<div></div>'}
                                
                                ${next ? `
                                    <button onclick="showPage('${next.id}')" class="flex flex-col items-end group text-right">
                                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em] mb-1">Successivo</span>
                                        <span class="text-xs font-black text-slate-900 group-hover:text-blue-600 transition uppercase tracking-tight">${next.title}</span>
                                    </button>
                                ` : '<div></div>'}
                            </div>
                        </div>
                    </div>
                `;
            }
            window.scrollTo(0, 0);
        }

        function sendFeedback() {
            const name = document.getElementById('fb-name').value;
            const text = document.getElementById('fb-text').value;
            if(!text) return;
            alert("Feedback inviato con successo. Grazie " + (name || "") + ".");
            document.getElementById('feedback-modal').classList.add('hidden');
            document.getElementById('fb-text').value = "";
        }
    </script>
</body>
</html>
